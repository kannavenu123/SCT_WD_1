<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegant Landing Page</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    height: 2000px;
    background: #0f172a;
    color: white;
    overflow-x: hidden;
}

/* ===== NAVBAR ===== */
nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 18px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    transition: 0.4s ease;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* Scroll effect */
nav.scrolled {
    background: rgba(15, 23, 42, 0.95);
    padding: 12px 50px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(45deg, #00f2fe, #4facfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* MENU */
ul {
    list-style: none;
    display: flex;
    gap: 30px;
}

ul li a {
    text-decoration: none;
    color: white;
    font-weight: 500;
    position: relative;
    transition: 0.3s;
}

/* animated underline */
ul li a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 0%;
    height: 2px;
    background: linear-gradient(45deg, #00f2fe, #4facfe);
    transition: 0.3s;
}

ul li a:hover::after {
    width: 100%;
}

ul li a:hover {
    color: #4facfe;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 20px;
    background: radial-gradient(circle at top, #1e293b, #0f172a);
}

.hero h1 {
    font-size: 60px;
    font-weight: 700;
    background: linear-gradient(45deg, #00f2fe, #4facfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: fadeIn 1s ease-in-out;
}

.hero p {
    margin-top: 15px;
    color: #cbd5e1;
    font-size: 18px;
}

/* BUTTON */
.btn {
    margin-top: 25px;
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #00f2fe, #4facfe);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(79,172,254,0.6);
}

/* MOBILE MENU */
.menu-toggle {
    display: none;
    font-size: 26px;
    cursor: pointer;
}

@media (max-width: 768px) {
    ul {
        position: absolute;
        top: 70px;
        right: 20px;
        flex-direction: column;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(10px);
        width: 200px;
        padding: 15px;
        border-radius: 12px;
        display: none;
    }

    ul.show {
        display: flex;
    }

    .menu-toggle {
        display: block;
    }

    .hero h1 {
        font-size: 40px;
    }
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<nav id="navbar">
    <div class="logo">ElegantUI</div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <ul id="menu">
        <li><a href="#">Home</a></li>
        <li><a href="#">Features</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<section class="hero">
    <div>
        <h1>Build Elegant Web Experiences</h1>
        <p>Modern UI • Smooth Animations • Clean Design</p>
        <button class="btn">Get Started</button>
    </div>
</section>

<script>
window.addEventListener("scroll", function () {
    let nav = document.getElementById("navbar");
    nav.classList.toggle("scrolled", window.scrollY > 50);
});

function toggleMenu() {
    document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
